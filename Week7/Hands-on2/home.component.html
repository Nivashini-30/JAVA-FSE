<!-- 
  =========================================================================================
  BINDING EXPLANATION (Task 1 Step 5):
  
  1. [property] (One-Way Data Binding: Component -> DOM): 
     Data flows in one direction from the TypeScript class property to the DOM element property.
     Changes in the component automatically update the DOM, but user changes in the DOM do 
     NOT flow back to update the TypeScript property.

  2. [(ngModel)] (Two-Way Data Binding: DOM <-> Component): 
     Data flows in both directions. Updating the TypeScript variable updates the input field, 
     and typing into the input field instantly updates the TypeScript variable. 
     Under the hood, [(ngModel)] is shorthand for [ngModel]="prop" (ngModelChange)="prop=$event".
  =========================================================================================
-->

<div style="padding: 1rem;">
  <!-- Step 1: Interpolation -->
  <h1>Welcome to the {{ portalName }}</h1>
  <p>Manage your enrolled courses, view available academic catalog items, and track your performance effortlessly.</p>

  <hr style="margin: 1.5rem 0;" />

  <!-- Step 4: Two-Way Binding -->
  <div style="margin-bottom: 1.5rem;">
    <label for="courseSearch"><strong>Search Courses: </strong></label>
    <input 
      id="courseSearch"
      type="text" 
      [(ngModel)]="searchTerm" 
      placeholder="Type a course name..." 
      style="padding: 0.5rem; width: 250px; margin-left: 0.5rem;"
    />
    <p style="margin-top: 0.5rem;">Searching for: <strong>{{ searchTerm }}</strong></p>
  </div>

  <hr style="margin: 1.5rem 0;" />

  <!-- Step 2: Property Binding & Step 3: Event Binding -->
  <div style="margin-bottom: 1.5rem;">
    <button 
      [disabled]="!isPortalActive" 
      (click)="onEnrollClick()"
      style="padding: 0.5rem 1rem; cursor: pointer;">
      Enroll Now
    </button>
    
    @if (message) {
      <p style="color: green; font-weight: bold; margin-top: 0.5rem;">{{ message }}</p>
    }
  </div>

  <hr style="margin: 1.5rem 0;" />

  <!-- Summary Statistics -->
  <div style="display: flex; gap: 1.5rem;">
    <div style="border: 1px solid #ccc; padding: 1rem; border-radius: 6px;">
      <h3>Courses Available: 12</h3>
    </div>
    <div style="border: 1px solid #ccc; padding: 1rem; border-radius: 6px;">
      <h3>Enrolled: 3</h3>
    </div>
    <div style="border: 1px solid #ccc; padding: 1rem; border-radius: 6px;">
      <h3>GPA: 3.8</h3>
    </div>
  </div>
</div>
